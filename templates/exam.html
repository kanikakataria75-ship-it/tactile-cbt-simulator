<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Assessment Portal — Live CBT Examination Session">
  <title>Assessment Portal — Live Practice Session</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* ── Question type badge ─────────────────────────────────────────── */
    .q-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .q-type-badge.mcq  { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
    .q-type-badge.integer { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }

    /* ── Integer / Numerical answer input ───────────────────────────── */
    .integer-answer-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 24px;
      background: var(--glass-bg, rgba(255,255,255,0.04));
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 14px;
      margin-top: 8px;
    }
    .integer-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--color-muted, #8a8fa8);
    }
    .integer-input-row { display: flex; align-items: center; gap: 10px; }
    .integer-input {
      width: 220px;
      padding: 14px 18px;
      font-size: 24px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: var(--color-text, #e2e8f0);
      background: var(--input-bg, rgba(255,255,255,0.06));
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
    }
    .integer-input::-webkit-inner-spin-button,
    .integer-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .integer-input:focus {
      border-color: var(--color-primary, #6366f1);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.25);
    }
    .integer-input.has-value {
      border-color: #22c55e;
      color: #4ade80;
      box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
    }
    .integer-clear-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--color-muted, #8a8fa8);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .integer-clear-btn:hover {
      border-color: rgba(239,68,68,0.5);
      color: #f87171;
    }
    .integer-hint {
      font-size: 12px;
      color: var(--color-muted, #8a8fa8);
    }
    /* ── Inline media inside question text ──────────────────────────── */
    #questionText img, #vignetteText img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      margin: 14px 0;
      display: block;
    }
    #questionText .table-responsive { overflow-x: auto; margin: 14px 0; }
    #questionText table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    #questionText th, #questionText td {
      padding: 9px 12px;
      border: 1px solid rgba(128,128,128,0.3);
    }
    #questionText th {
      background: rgba(128,128,128,0.12);
      font-weight: 600;
    }
  </style>
  <script>
    function initTheme() {
      const currentTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
    }
    initTheme();
  </script>
</head>

<body>
  <!-- Ambient Blurred Orbs -->
  <div class="orb-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <button class="theme-toggle" id="themeToggleBtn" onclick="toggleGlobalTheme()">
    <span class="theme-icon"><i class="fa-solid fa-moon"></i></span> <span id="themeToggleText">Dark</span>
  </button>

  <div class="exam-wrapper">

    <!-- ═══ HEADER ═══ -->
    <header class="exam-header">
      <div class="brand">
        <span class="badge">TEST</span>
        <span>Practice Environment</span>
        <span class="session-label">— {{ exam_session }} Session</span>
      </div>

      <div class="timer-display" id="timerDisplay">
        <span class="timer-icon"><i class="fa-solid fa-clock"></i></span>
        <span id="timerText">00:00</span>
      </div>

      <div class="q-progress" id="qProgress">
        Q <span id="currentQNum">1</span> of <span id="totalQNum">{{ total_questions }}</span>
      </div>
    </header>

    <!-- ═══ MAIN SPLIT PANE ═══ -->
    <main class="exam-main" id="examMain">

      <!-- Left Pane — Vignette -->
      <div class="vignette-pane" id="vignettePane">
        <div class="vignette-label" id="vignetteLabel">
          <i class="fa-solid fa-file-lines" style="margin-right:6px;"></i>
          Case Study / Vignette
        </div>
        <div class="vignette-text" id="vignetteText"></div>
      </div>

      <!-- Right Pane — Question & Choices -->
      <div class="question-pane" id="questionPane">
        <div class="glass-card" style="padding:30px;margin-bottom:20px;border-radius:var(--radius-md);">
          <div class="question-number" id="questionNumber">Question 1</div>
          <div class="question-text"   id="questionText">Loading question content...</div>
        </div>

        <div class="options-list" id="optionsList">
          <!-- Options or integer input rendered dynamically -->
        </div>

        <!-- Confidence Level Tracker -->
        <div class="confidence-container" id="confidenceSection">
          <!-- Rendered dynamically -->
        </div>

        <div>
          <button class="btn btn-ghost" id="flagBtn" onclick="toggleFlag()" style="width:100%;">
            <i class="fa-solid fa-flag" style="margin-right:8px;"></i> Flag question for review
          </button>
        </div>
      </div>

    </main>

    <!-- ═══ FOOTER ═══ -->
    <footer class="exam-footer">
      <!-- Side-Dock Nav Grid -->
      <div class="nav-grid-panel">
        <div class="nav-grid" id="navGrid">
          <!-- Dynamically populated -->
        </div>
      </div>

      <!-- Actions -->
      <div class="footer-actions">
        <button class="btn btn-secondary btn-sm" id="prevBtn" onclick="navigateQ(-1)">← Prev</button>
        <button class="btn btn-secondary btn-sm" id="nextBtn" onclick="navigateQ(1)">Next →</button>
        <button class="btn btn-danger btn-sm" onclick="showSubmitModal()">Submit Exam</button>
      </div>
    </footer>

  </div>

  <!-- SUBMIT MODAL -->
  <div class="modal-overlay" id="submitModal">
    <div class="modal-box glass-card">
      <h3>Finalize Practice Session?</h3>
      <p id="submitModalText">Are you sure you want to grade your answers?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="hideSubmitModal()">Cancel</button>
        <button class="btn btn-primary"   onclick="submitExam()">Confirm Submit</button>
      </div>
    </div>
  </div>

  <!-- Hidden Form Submission -->
  <form id="submitForm" action="/submit" method="POST" style="display:none;">
    <input type="hidden" name="answers"     id="answersField">
    <input type="hidden" name="flags"       id="flagsField">
    <input type="hidden" name="time_spent"  id="timeSpentField">
    <input type="hidden" name="confidences" id="confidencesField">
  </form>

  <script>
    const questions          = {{ questions_json | safe }};
    const DURATION_MINUTES   = {{ duration }};
    const TOTAL              = questions.length;
    const MAX_CHOICES_ALLOWED = {{ num_choices_allowed }};

    // ── State Variables ────────────────────────────────────────────────
    let currentIndex          = 0;
    let answers               = {};   // { "1": "A" } or { "3": "7" }
    let flags                 = {};   // { "1": true }
    let confidences           = {};   // { "1": "High" }
    let strikeouts            = {};   // { "1": { "A": true } }
    let timeRemaining         = DURATION_MINUTES * 60;
    let timerInterval         = null;
    let submitted             = false;
    let timeSpent             = new Array(TOTAL).fill(0);
    let activeQuestionInterval = null;

    // ── Init ──────────────────────────────────────────────────────────
    function init() {
      questions.forEach(q => {
        confidences[String(q.id)] = 'High';
      });
      buildNavGrid();
      renderQuestion(0);
      startTimer();
      startActiveQuestionTimer();
    }

    // ── Timer ─────────────────────────────────────────────────────────
    function startTimer() {
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        timeRemaining--;
        updateTimerDisplay();
        if (timeRemaining <= 0) {
          clearInterval(timerInterval);
          submitExam();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const mins  = Math.floor(Math.max(0, timeRemaining) / 60);
      const secs  = Math.max(0, timeRemaining) % 60;
      const timerText    = document.getElementById('timerText');
      const timerDisplay = document.getElementById('timerDisplay');

      timerText.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      timerDisplay.classList.remove('warning', 'critical');
      if      (timeRemaining <= 60)  timerDisplay.classList.add('critical');
      else if (timeRemaining <= 300) timerDisplay.classList.add('warning');
    }

    // ── Render Question ───────────────────────────────────────────────
    function renderQuestion(index) {
      const q   = questions[index];
      const qId = String(q.id);
      currentIndex = index;

      document.getElementById('currentQNum').textContent   = index + 1;
      document.getElementById('questionNumber').textContent = `Question ${index + 1} of ${TOTAL}`;

      // ── Options presence detection ───────────────────────────────
      const choices = q.choices || {};
      const hasOptions = choices && Object.keys(choices).length > 0;

      // ── Question type badge ──────────────────────────────────────
      const existingBadge = document.getElementById('qTypeBadge');
      if (existingBadge) existingBadge.remove();
      const badge = document.createElement('div');
      badge.id = 'qTypeBadge';
      badge.className = `q-type-badge ${hasOptions ? 'mcq' : 'integer'}`;
      badge.innerHTML = hasOptions
        ? '<i class="fa-solid fa-list-check"></i> Multiple Choice'
        : '<i class="fa-solid fa-keyboard"></i> Integer / Numerical Type';
      document.getElementById('questionNumber').insertAdjacentElement('afterend', badge);

      // ── Render HTML safely with inline media replacement ─────────
      let qText = q.text || '';
      // Replace any legacy [[MEDIA_ANCHOR_X]] tokens with media HTML
      if (q.media) {
        Object.keys(q.media).forEach(mediaId => {
          qText = qText.replaceAll(`[[MEDIA_ANCHOR_${mediaId}]]`, q.media[mediaId]);
        });
      }
      // Strip any remaining unreplaced media tokens
      qText = qText.replace(/\[\[MEDIA_ANCHOR_\d+\]\]/g, '');
      qText = qText.replace(/\[\[DIAGRAM:page_\d+\]\]/g, '');
      document.getElementById('questionText').innerHTML = qText;

      // Vignette pane (Case Study narrative isolation)
      const examMain = document.getElementById('examMain');
      if (q.vignette && q.vignette.trim() !== '') {
        examMain.classList.remove('standalone-mode');
        let vigText = q.vignette;
        if (q.media) {
          Object.keys(q.media).forEach(mediaId => {
            vigText = vigText.replaceAll(`[[MEDIA_ANCHOR_${mediaId}]]`, q.media[mediaId]);
          });
        }
        vigText = vigText.replace(/\[\[MEDIA_ANCHOR_\d+\]\]/g, '');
        vigText = vigText.replace(/\[\[DIAGRAM:page_\d+\]\]/g, '');
        document.getElementById('vignetteText').innerHTML = vigText;
        document.getElementById('vignetteLabel').style.display = '';
      } else {
        examMain.classList.add('standalone-mode');
        document.getElementById('vignetteText').innerHTML = '';
      }

      // ── Options area ─────────────────────────────────────────────
      const optionsList = document.getElementById('optionsList');
      optionsList.innerHTML = ''; // Fully scrub container shell clean on transition

      if (!hasOptions) {
        // ── Integer / Numerical input (labeled Integer / Numerical Type) ──
        const currentVal = answers[qId] || '';
        const container  = document.createElement('div');
        container.className = 'integer-answer-container';
        container.innerHTML = `
          <span class="integer-label">Integer / Numerical Type</span>
          <div class="integer-input-row">
            <input
              type="number"
              step="any"
              class="integer-input ${currentVal ? 'has-value' : ''}"
              id="integerInput_${qId}"
              value="${currentVal}"
              placeholder="Enter numerical answer"
              autocomplete="off"
            >
            <button class="integer-clear-btn" id="integerClear_${qId}"
                    title="Clear answer">
              <i class="fa-solid fa-xmark"></i> Clear
            </button>
          </div>
          <span class="integer-hint">
            <i class="fa-solid fa-circle-info" style="margin-right:4px;"></i>
            Enter a whole number or decimal. Press Tab to move on.
          </span>
        `;

        const inputEl = container.querySelector('input');
        const clearBtn = container.querySelector('.integer-clear-btn');

        inputEl.addEventListener('input', () => {
          const val = inputEl.value.trim();
          if (val === '') {
            delete answers[qId];
            inputEl.classList.remove('has-value');
          } else {
            answers[qId] = val;
            inputEl.classList.add('has-value');
          }
          updateNavGrid();
        });

        clearBtn.addEventListener('click', () => {
          inputEl.value = '';
          delete answers[qId];
          inputEl.classList.remove('has-value');
          inputEl.focus();
          updateNavGrid();
        });

        optionsList.appendChild(container);
        setTimeout(() => inputEl.focus(), 50);

      } else {
        // ── MCQ radio options (Multiple Choice) ──────────────────────
        const letters = ['A', 'B', 'C', 'D'].slice(0, MAX_CHOICES_ALLOWED);
        letters.forEach(letter => {
          if (!choices[letter]) return;

          const div = document.createElement('div');
          div.className  = 'option-item';
          div.dataset.letter = letter;

          if (answers[qId] === letter)                              div.classList.add('selected');
          if (strikeouts[qId] && strikeouts[qId][letter])          div.classList.add('strikeout');

          div.innerHTML = `
            <input type="radio" name="answer" value="${letter}" id="opt_${letter}" ${answers[qId] === letter ? 'checked' : ''}>
            <span class="option-letter">${letter}</span>
            <span class="option-label">${choices[letter]}</span>
          `;

          div.addEventListener('click', e => { e.preventDefault(); selectAnswer(qId, letter); });
          div.addEventListener('contextmenu', e => { e.preventDefault(); toggleStrikeout(qId, letter, div); });

          optionsList.appendChild(div);
        });
      }

      // ── Confidence Pill Section ───────────────────────────────────
      const activeConf = confidences[qId] || 'High';
      document.getElementById('confidenceSection').innerHTML = `
        <span class="confidence-label">Set Answer Confidence:</span>
        <div class="confidence-options">
          <button class="confidence-pill high  ${activeConf === 'High'  ? 'active' : ''}" onclick="setConfidenceLevel('${qId}','High')">
            <i class="fa-solid fa-circle-check"      style="color:var(--color-correct);margin-right:6px;"></i> High
          </button>
          <button class="confidence-pill guess ${activeConf === 'Guess' ? 'active' : ''}" onclick="setConfidenceLevel('${qId}','Guess')">
            <i class="fa-solid fa-circle-question"   style="color:var(--color-flagged);margin-right:6px;"></i> 50/50 Guess
          </button>
          <button class="confidence-pill blind ${activeConf === 'Blind' ? 'active' : ''}" onclick="setConfidenceLevel('${qId}','Blind')">
            <i class="fa-solid fa-circle-exclamation" style="color:var(--color-incorrect);margin-right:6px;"></i> Blind Guess
          </button>
        </div>
      `;

      // ── Flag button ───────────────────────────────────────────────
      const flagBtn = document.getElementById('flagBtn');
      if (flags[qId]) {
        flagBtn.classList.add('btn-primary');
        flagBtn.classList.remove('btn-ghost');
        flagBtn.innerHTML = '<i class="fa-solid fa-flag" style="margin-right:8px;"></i> Question Flagged for Review';
      } else {
        flagBtn.classList.remove('btn-primary');
        flagBtn.classList.add('btn-ghost');
        flagBtn.innerHTML = '<i class="fa-solid fa-flag" style="margin-right:8px;"></i> Flag question for review';
      }

      updateNavGrid();
      document.getElementById('prevBtn').disabled = index === 0;
      document.getElementById('nextBtn').disabled = index === TOTAL - 1;
    }

    // ── Answer helpers ────────────────────────────────────────────────
    function selectAnswer(qId, letter) {
      if (answers[qId] === letter) {
        delete answers[qId];
      } else {
        answers[qId] = letter;
      }
      renderQuestion(currentIndex);
    }

    // Right-click cross out options contextmenu handler
    function toggleStrikeout(qId, letter, element) {
      if (!strikeouts[qId]) strikeouts[qId] = {};
      strikeouts[qId][letter] = !strikeouts[qId][letter];
      element.classList.toggle('strikeout');
    }

    function setConfidenceLevel(qId, level) {
      confidences[qId] = level;
      renderQuestion(currentIndex);
    }

    function toggleFlag() {
      const qId = String(questions[currentIndex].id);
      flags[qId] = !flags[qId];
      renderQuestion(currentIndex);
    }

    // ── Navigation ────────────────────────────────────────────────────
    function navigateQ(delta) {
      const newIndex = currentIndex + delta;
      if (newIndex >= 0 && newIndex < TOTAL) renderQuestion(newIndex);
    }

    function jumpToQ(index) {
      if (index >= 0 && index < TOTAL) renderQuestion(index);
    }

    // ── Nav Grid ──────────────────────────────────────────────────────
    function buildNavGrid() {
      const grid = document.getElementById('navGrid');
      grid.innerHTML = '';
      for (let i = 0; i < TOTAL; i++) {
        const btn        = document.createElement('button');
        btn.className    = 'q-btn';
        btn.textContent  = i + 1;
        btn.dataset.index = i;
        btn.addEventListener('click', () => jumpToQ(i));
        grid.appendChild(btn);
      }
    }

    function updateNavGrid() {
      document.querySelectorAll('.nav-grid .q-btn').forEach((btn, i) => {
        const qId = String(questions[i].id);
        btn.classList.remove('attempted', 'flagged', 'current');
        if (i === currentIndex) btn.classList.add('current');
        if (flags[qId])         btn.classList.add('flagged');
        else if (answers[qId])  btn.classList.add('attempted');
      });
    }

    // ── Active question timer ─────────────────────────────────────────
    function startActiveQuestionTimer() {
      if (activeQuestionInterval) clearInterval(activeQuestionInterval);
      activeQuestionInterval = setInterval(() => {
        if (!submitted) timeSpent[currentIndex]++;
      }, 1000);
    }

    // ── Submit flow ───────────────────────────────────────────────────
    function showSubmitModal() {
      const answeredCount = Object.keys(answers).length;
      const unanswered    = TOTAL - answeredCount;
      const flaggedCount  = Object.values(flags).filter(Boolean).length;

      let msg = '';
      if (unanswered > 0) msg += `You have left ${unanswered} question${unanswered > 1 ? 's' : ''} blank. `;
      if (flaggedCount > 0) msg += `You have marked ${flaggedCount} question${flaggedCount > 1 ? 's' : ''} to review. `;
      if (!unanswered && !flaggedCount) msg = 'All questions completed. Ready to calculate grade?';
      else msg += 'Do you wish to submit anyway?';

      document.getElementById('submitModalText').textContent = msg;
      document.getElementById('submitModal').classList.add('active');
    }

    function hideSubmitModal() {
      document.getElementById('submitModal').classList.remove('active');
    }

    function submitExam() {
      if (submitted) return;
      submitted = true;

      clearInterval(timerInterval);
      if (activeQuestionInterval) clearInterval(activeQuestionInterval);

      document.getElementById('answersField').value     = JSON.stringify(answers);
      document.getElementById('flagsField').value       = JSON.stringify(flags);
      document.getElementById('timeSpentField').value   = JSON.stringify(timeSpent);
      document.getElementById('confidencesField').value = JSON.stringify(confidences);
      document.getElementById('submitForm').submit();
    }

    // ── Keyboard shortcuts ────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;

      if      (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigateQ(1);
      else if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigateQ(-1);
      else if (e.key === 'f' || e.key === 'F') toggleFlag();
      else {
        const q = questions[currentIndex];
        const choices = q.choices || {};
        const hasOptions = choices && Object.keys(choices).length > 0;
        if (hasOptions) {
          const letter = e.key.toUpperCase();
          if (['A','B','C'].includes(letter)) selectAnswer(String(q.id), letter);
          if (letter === 'D' && MAX_CHOICES_ALLOWED >= 4) selectAnswer(String(q.id), 'D');
        }
      }
    });

    // ── Theme Toggle ──────────────────────────────────────────────────
    function toggleGlobalTheme() {
      const cur   = document.documentElement.getAttribute('data-theme') || 'dark';
      const next  = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeToggleUI(next);
    }

    function updateThemeToggleUI(theme) {
      const btn  = document.getElementById('themeToggleBtn');
      if (!btn) return;
      const icon = btn.querySelector('.theme-icon');
      const text = btn.querySelector('#themeToggleText');
      if (theme === 'light') {
        if (icon) icon.innerHTML   = '<i class="fa-solid fa-sun"></i>';
        if (text) text.textContent = 'Light';
      } else {
        if (icon) icon.innerHTML   = '<i class="fa-solid fa-moon"></i>';
        if (text) text.textContent = 'Dark';
      }
    }

    updateThemeToggleUI(localStorage.getItem('theme') || 'dark');
    init();
  </script>
</body>

</html>
