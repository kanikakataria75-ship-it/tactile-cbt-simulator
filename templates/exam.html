<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Assessment Portal — Live CBT Examination Session">
  <title>Assessment Portal — Live Practice Session</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    function initTheme() {
      const currentTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
    }
    initTheme();
  </script>
</head>
<body>
  <!-- Ambient Blurred Orbs -->
  <div class="orb-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <button class="theme-toggle" id="themeToggleBtn" onclick="toggleGlobalTheme()">
    <span class="theme-icon"><i class="fa-solid fa-moon"></i></span> <span id="themeToggleText">Dark</span>
  </button>

  <div class="exam-wrapper">

    <!-- ═══ HEADER ═══ -->
    <header class="exam-header">
      <div class="brand">
        <span class="badge">TEST</span>
        <span>Practice Environment</span>
        <span class="session-label">— {{ exam_session }} Session</span>
      </div>

      <div class="timer-display" id="timerDisplay">
        <span class="timer-icon"><i class="fa-solid fa-clock"></i></span>
        <span id="timerText">00:00</span>
      </div>

      <div class="q-progress" id="qProgress">
        Q <span id="currentQNum">1</span> of <span id="totalQNum">{{ total_questions }}</span>
      </div>
    </header>

    <!-- ═══ MAIN SPLIT PANE ═══ -->
    <main class="exam-main" id="examMain">

      <!-- Left Pane — Vignette -->
      <div class="vignette-pane" id="vignettePane">
        <div class="vignette-label" id="vignetteLabel"><i class="fa-solid fa-file-lines" style="margin-right: 6px;"></i> Case Study / Vignette</div>
        <div class="vignette-text" id="vignetteText"></div>
      </div>

      <!-- Right Pane — Question & Choices -->
      <div class="question-pane" id="questionPane">
        <div class="glass-card" style="padding: 30px; margin-bottom: 20px; border-radius: var(--radius-md);">
          <div class="question-number" id="questionNumber">Question 1</div>
          <div class="question-text" id="questionText">Loading question content...</div>
        </div>

        <div class="options-list" id="optionsList">
          <!-- Options rendered dynamically -->
        </div>

        <!-- Confidence Level Tracker -->
        <div class="confidence-container" id="confidenceSection">
          <!-- Rendered dynamically -->
        </div>

        <div>
          <button class="btn btn-ghost" id="flagBtn" onclick="toggleFlag()" style="width: 100%;">
            <i class="fa-solid fa-flag" style="margin-right: 8px;"></i> Flag question for review
          </button>
        </div>
      </div>

    </main>

    <!-- ═══ FOOTER ═══ -->
    <footer class="exam-footer">
      <!-- Side-Dock Nav Grid -->
      <div class="nav-grid-panel">
        <div class="nav-grid" id="navGrid">
          <!-- Dynamically populated -->
        </div>
      </div>

      <!-- Actions -->
      <div class="footer-actions">
        <button class="btn btn-secondary btn-sm" id="prevBtn" onclick="navigateQ(-1)">← Prev</button>
        <button class="btn btn-secondary btn-sm" id="nextBtn" onclick="navigateQ(1)">Next →</button>
        <button class="btn btn-danger btn-sm" onclick="showSubmitModal()">Submit Exam</button>
      </div>
    </footer>

  </div>

  <!-- SUBMIT MODAL -->
  <div class="modal-overlay" id="submitModal">
    <div class="modal-box glass-card">
      <h3>Finalize Practice Session?</h3>
      <p id="submitModalText">Are you sure you want to grade your answers?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="hideSubmitModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitExam()">Confirm Submit</button>
      </div>
    </div>
  </div>

  <!-- Hidden Form Submission -->
  <form id="submitForm" action="/submit" method="POST" style="display:none;">
    <input type="hidden" name="answers" id="answersField">
    <input type="hidden" name="flags" id="flagsField">
    <input type="hidden" name="time_spent" id="timeSpentField">
    <input type="hidden" name="confidences" id="confidencesField">
  </form>

  <script>
    const questions = {{ questions_json | safe }};
    const DURATION_MINUTES = {{ duration }};
    const TOTAL = questions.length;
    const MAX_CHOICES_ALLOWED = {{ num_choices_allowed }};

    // State Variables
    let currentIndex = 0;
    let answers = {};        // { "1": "A", "2": "B" }
    let flags = {};          // { "1": true }
    let confidences = {};    // { "1": "High", "2": "Guess" }
    let strikeouts = {};     // { "1": { "A": true } }
    let timeRemaining = DURATION_MINUTES * 60;
    let timerInterval = null;
    let submitted = false;
    let timeSpent = new Array(TOTAL).fill(0);
    let activeQuestionInterval = null;

    function init() {
      // Default all confidence tracking scores to 'High'
      questions.forEach(q => {
        confidences[String(q.id)] = 'High';
      });

      buildNavGrid();
      renderQuestion(0);
      startTimer();
      startActiveQuestionTimer();
    }

    function startTimer() {
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        timeRemaining--;
        updateTimerDisplay();
        if (timeRemaining <= 0) {
          clearInterval(timerInterval);
          submitExam();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const mins = Math.floor(Math.max(0, timeRemaining) / 60);
      const secs = Math.max(0, timeRemaining) % 60;
      const timerText = document.getElementById('timerText');
      const timerDisplay = document.getElementById('timerDisplay');

      timerText.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

      timerDisplay.classList.remove('warning', 'critical');
      if (timeRemaining <= 60) {
        timerDisplay.classList.add('critical');
      } else if (timeRemaining <= 300) {
        timerDisplay.classList.add('warning');
      }
    }

    function renderQuestion(index) {
      const q = questions[index];
      const qId = String(q.id);
      currentIndex = index;

      document.getElementById('currentQNum').textContent = index + 1;
      document.getElementById('questionNumber').textContent = `Question ${index + 1} of ${TOTAL}`;
      document.getElementById('questionText').textContent = q.text;

      const examMain = document.getElementById('examMain');
      if (q.vignette) {
        examMain.classList.remove('standalone-mode');
        document.getElementById('vignetteText').textContent = q.vignette;
        document.getElementById('vignetteLabel').style.display = '';
      } else {
        examMain.classList.add('standalone-mode');
        document.getElementById('vignetteText').textContent = '';
      }

      // Render Options based on Examination rules (A-C vs A-D choices)
      const optionsList = document.getElementById('optionsList');
      optionsList.innerHTML = '';

      const letters = ['A', 'B', 'C', 'D'].slice(0, MAX_CHOICES_ALLOWED);
      letters.forEach(letter => {
        if (!q.choices[letter]) return;

        const div = document.createElement('div');
        div.className = 'option-item';
        div.dataset.letter = letter;

        if (answers[qId] === letter) {
          div.classList.add('selected');
        }

        if (strikeouts[qId] && strikeouts[qId][letter]) {
          div.classList.add('strikeout');
        }

        div.innerHTML = `
          <input type="radio" name="answer" value="${letter}" id="opt_${letter}" ${answers[qId] === letter ? 'checked' : ''}>
          <span class="option-letter">${letter}</span>
          <span class="option-label">${q.choices[letter]}</span>
        `;

        div.addEventListener('click', (e) => {
          e.preventDefault();
          selectAnswer(qId, letter);
        });

        div.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          toggleStrikeout(qId, letter, div);
        });

        optionsList.appendChild(div);
      });

      // Render Confidence Pill Section
      const confidenceSection = document.getElementById('confidenceSection');
      const activeConf = confidences[qId] || 'High';
      confidenceSection.innerHTML = `
        <span class="confidence-label">Set Answer Confidence:</span>
        <div class="confidence-options">
          <button class="confidence-pill high ${activeConf === 'High' ? 'active' : ''}" onclick="setConfidenceLevel('${qId}', 'High')"><i class="fa-solid fa-circle-check" style="color: var(--color-correct); margin-right: 6px;"></i> High</button>
          <button class="confidence-pill guess ${activeConf === 'Guess' ? 'active' : ''}" onclick="setConfidenceLevel('${qId}', 'Guess')"><i class="fa-solid fa-circle-question" style="color: var(--color-flagged); margin-right: 6px;"></i> 50/50 Guess</button>
          <button class="confidence-pill blind ${activeConf === 'Blind' ? 'active' : ''}" onclick="setConfidenceLevel('${qId}', 'Blind')"><i class="fa-solid fa-circle-exclamation" style="color: var(--color-incorrect); margin-right: 6px;"></i> Blind Guess</button>
        </div>
      `;

      // Flag states
      const flagBtn = document.getElementById('flagBtn');
      if (flags[qId]) {
        flagBtn.classList.add('btn-primary');
        flagBtn.classList.remove('btn-ghost');
        flagBtn.innerHTML = '<i class="fa-solid fa-flag" style="margin-right: 8px;"></i> Question Flagged for Review';
      } else {
        flagBtn.classList.remove('btn-primary');
        flagBtn.classList.add('btn-ghost');
        flagBtn.innerHTML = '<i class="fa-solid fa-flag" style="margin-right: 8px;"></i> Flag question for review';
      }

      updateNavGrid();

      document.getElementById('prevBtn').disabled = index === 0;
      document.getElementById('nextBtn').disabled = index === TOTAL - 1;
    }

    function selectAnswer(qId, letter) {
      if (answers[qId] === letter) {
        delete answers[qId];
      } else {
        answers[qId] = letter;
      }
      renderQuestion(currentIndex);
    }

    function toggleStrikeout(qId, letter, element) {
      if (!strikeouts[qId]) strikeouts[qId] = {};
      strikeouts[qId][letter] = !strikeouts[qId][letter];
      element.classList.toggle('strikeout');
    }

    function setConfidenceLevel(qId, level) {
      confidences[qId] = level;
      renderQuestion(currentIndex);
    }

    function toggleFlag() {
      const qId = String(questions[currentIndex].id);
      flags[qId] = !flags[qId];
      renderQuestion(currentIndex);
    }

    function navigateQ(delta) {
      const newIndex = currentIndex + delta;
      if (newIndex >= 0 && newIndex < TOTAL) {
        renderQuestion(newIndex);
      }
    }

    function jumpToQ(index) {
      if (index >= 0 && index < TOTAL) {
        renderQuestion(index);
      }
    }

    function buildNavGrid() {
      const grid = document.getElementById('navGrid');
      grid.innerHTML = '';

      for (let i = 0; i < TOTAL; i++) {
        const btn = document.createElement('button');
        btn.className = 'q-btn';
        btn.textContent = i + 1;
        btn.dataset.index = i;
        btn.addEventListener('click', () => jumpToQ(i));
        grid.appendChild(btn);
      }
    }

    function updateNavGrid() {
      const buttons = document.querySelectorAll('.nav-grid .q-btn');
      buttons.forEach((btn, i) => {
        const qId = String(questions[i].id);
        btn.classList.remove('attempted', 'flagged', 'current');

        if (i === currentIndex) {
          btn.classList.add('current');
        }

        if (flags[qId]) {
          btn.classList.add('flagged');
        } else if (answers[qId]) {
          btn.classList.add('attempted');
        }
      });
    }

    function startActiveQuestionTimer() {
      if (activeQuestionInterval) clearInterval(activeQuestionInterval);
      activeQuestionInterval = setInterval(() => {
        if (!submitted) {
          timeSpent[currentIndex]++;
        }
      }, 1000);
    }

    function showSubmitModal() {
      const answeredCount = Object.keys(answers).length;
      const unanswered = TOTAL - answeredCount;
      const flaggedCount = Object.values(flags).filter(Boolean).length;

      let msg = '';
      if (unanswered > 0) {
        msg += `You have left ${unanswered} question${unanswered > 1 ? 's' : ''} blank. `;
      }
      if (flaggedCount > 0) {
        msg += `You have marked ${flaggedCount} question${flaggedCount > 1 ? 's' : ''} to review. `;
      }
      if (unanswered === 0 && flaggedCount === 0) {
        msg = 'All questions completed. Ready to calculate grade?';
      } else {
        msg += 'Do you wish to submit anyway?';
      }

      document.getElementById('submitModalText').textContent = msg;
      document.getElementById('submitModal').classList.add('active');
    }

    function hideSubmitModal() {
      document.getElementById('submitModal').classList.remove('active');
    }

    function submitExam() {
      if (submitted) return;
      submitted = true;

      clearInterval(timerInterval);
      if (activeQuestionInterval) clearInterval(activeQuestionInterval);

      document.getElementById('answersField').value = JSON.stringify(answers);
      document.getElementById('flagsField').value = JSON.stringify(flags);
      document.getElementById('timeSpentField').value = JSON.stringify(timeSpent);
      document.getElementById('confidencesField').value = JSON.stringify(confidences);
      document.getElementById('submitForm').submit();
    }

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        navigateQ(1);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        navigateQ(-1);
      } else if (e.key === 'a' || e.key === 'A') {
        selectAnswer(String(questions[currentIndex].id), 'A');
      } else if (e.key === 'b' || e.key === 'B') {
        selectAnswer(String(questions[currentIndex].id), 'B');
      } else if (e.key === 'c' || e.key === 'C') {
        selectAnswer(String(questions[currentIndex].id), 'C');
      } else if (e.key === 'd' || e.key === 'D') {
        if (MAX_CHOICES_ALLOWED >= 4) {
          selectAnswer(String(questions[currentIndex].id), 'D');
        }
      } else if (e.key === 'f' || e.key === 'F') {
        toggleFlag();
      }
    });

    // Theme Toggle Functionality
    function toggleGlobalTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeToggleUI(newTheme);
    }

    function updateThemeToggleUI(theme) {
      const btn = document.getElementById('themeToggleBtn');
      if (!btn) return;
      const icon = btn.querySelector('.theme-icon');
      const text = btn.querySelector('#themeToggleText');
      if (theme === 'light') {
        if (icon) icon.innerHTML = '<i class="fa-solid fa-sun"></i>';
        if (text) text.textContent = 'Light';
      } else {
        if (icon) icon.innerHTML = '<i class="fa-solid fa-moon"></i>';
        if (text) text.textContent = 'Dark';
      }
    }

    updateThemeToggleUI(localStorage.getItem('theme') || 'dark');
    init();
  </script>
</body>
</html>
